<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 

  <link rel="icon" type="/image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Order summary card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@500;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <main>
    <article class="card">
      <div class="card-header">
        <img src="./images/illustration-hero.svg" alt="illustration-hero.svg" alt="illustration of listening person">
      </div>
      <div class="card-bordy">
        <h1 class="card-title">Order Summary</h1>
        <p class="card-descrition">
          You can now listen to millions of songs, audiobooks, and podcasts on anywhere
          device anywhere you like!  
        </p>
        <div class="plan-box">
          <div class="plan-icon">
            <img src="./images/icon-music.svg" alt="image-icon">
          </div>
          <div class="plan-details">
            <div class="plan-name">Annual Plan</div>
            <div class="plan-price">$59.99/year</div>
          </div>
          <a href="#" class="plan-change">Change</a>
        </div>
      </div>
      <button class="btn-btn-primary">Proceed to Payment </button>
      <button class="btn-btn-secondary">Cancel Order</button>
    </article>
  </main>
  
</body>
</html>
